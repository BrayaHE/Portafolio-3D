<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museo con Puertas - Primera Persona</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, Helvetica, sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            z-index: 100;
            pointer-events: none;
        }
        #controles {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: #ccc;
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">MUSEO | Haz clic para comenzar</div>
    <div id="controles">CLIC = activar mouse | WASD = moverte | ESPACIO = saltar | ESC = salir</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- CONFIGURACIÓN INICIAL ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122); // Color oscuro

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 0); // Posición inicial en el pasillo central

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- CONTROLES PRIMERA PERSONA ---
        const controls = new PointerLockControls(camera, renderer.domElement);

        document.addEventListener('click', () => {
            controls.lock();
        });

        controls.addEventListener('lock', () => {
            console.log('Controles activados');
            document.getElementById('info').style.backgroundColor = 'rgba(0,100,0,0.8)';
        });

        controls.addEventListener('unlock', () => {
            console.log('Controles desactivados');
            document.getElementById('info').style.backgroundColor = 'rgba(0,0,0,0.8)';
        });

        scene.add(controls.getObject());

        // --- VARIABLES DE MOVIMIENTO ---
        const moveState = {
            forward: false,
            backward: false,
            left: false,
            right: false
        };

        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        const speed = 8.0;

        document.addEventListener('keydown', (event) => {
            switch(event.code) {
                case 'KeyW': moveState.forward = true; break;
                case 'KeyA': moveState.left = true; break;
                case 'KeyS': moveState.backward = true; break;
                case 'KeyD': moveState.right = true; break;
                case 'Space': 
                    // Pequeño salto para pruebas
                    if (camera.position.y < 2.1) camera.position.y += 0.5;
                    break;
            }
        });

        document.addEventListener('keyup', (event) => {
            switch(event.code) {
                case 'KeyW': moveState.forward = false; break;
                case 'KeyA': moveState.left = false; break;
                case 'KeyS': moveState.backward = false; break;
                case 'KeyD': moveState.right = false; break;
            }
        });

        // --- LUCES ---
        // Luz ambiental
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        // Luces en el techo del pasillo
        for (let i = -3; i <= 3; i+=2) {
            for (let j = -3; j <= 3; j+=2) {
                if (i === 0 && j === 0) continue; // Centro sin luz
                const luz = new THREE.PointLight(0xffeedd, 0.8, 10);
                luz.position.set(i*3, 4.5, j*3);
                scene.add(luz);
                
                // Bombilla visible
                const bombilla = new THREE.Mesh(
                    new THREE.SphereGeometry(0.2, 8, 8),
                    new THREE.MeshStandardMaterial({ color: 0xffaa33, emissive: 0x442200 })
                );
                bombilla.position.set(i*3, 4.5, j*3);
                scene.add(bombilla);
            }
        }

        // --- SUELO PRINCIPAL (pasillo central) ---
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x445566 });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- PAREDES EXTERIORES DEL EDIFICIO ---
        const paredExteriorMat = new THREE.MeshStandardMaterial({ color: 0x2a3a4a });
        
        // Pared Norte
        const paredN = new THREE.Mesh(new THREE.BoxGeometry(30, 5, 0.5), paredExteriorMat);
        paredN.position.set(0, 2.5, -15);
        paredN.receiveShadow = true;
        paredN.castShadow = true;
        scene.add(paredN);
        
        // Pared Sur
        const paredS = new THREE.Mesh(new THREE.BoxGeometry(30, 5, 0.5), paredExteriorMat);
        paredS.position.set(0, 2.5, 15);
        paredS.receiveShadow = true;
        paredS.castShadow = true;
        scene.add(paredS);
        
        // Pared Este
        const paredE = new THREE.Mesh(new THREE.BoxGeometry(0.5, 5, 30), paredExteriorMat);
        paredE.position.set(15, 2.5, 0);
        paredE.receiveShadow = true;
        paredE.castShadow = true;
        scene.add(paredE);
        
        // Pared Oeste
        const paredO = new THREE.Mesh(new THREE.BoxGeometry(0.5, 5, 30), paredExteriorMat);
        paredO.position.set(-15, 2.5, 0);
        paredO.receiveShadow = true;
        paredO.castShadow = true;
        scene.add(paredO);
        
        // Techo
        const techo = new THREE.Mesh(new THREE.BoxGeometry(30, 0.5, 30), paredExteriorMat);
        techo.position.set(0, 5, 0);
        techo.receiveShadow = true;
        techo.castShadow = true;
        scene.add(techo);

        // --- FUNCIÓN PARA CREAR UNA HABITACIÓN CON UNA SOLA PUERTA ---
        function crearHabitacion(tamX, tamZ, color, posX, posZ, direccionPuerta) {
            const grupo = new THREE.Group();
            const altura = 3;
            const grosorPared = 0.3;
            const anchoPuerta = 1.5;
            const altoPuerta = 2.2;
            
            // Material de paredes sólidas
            const paredMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.7 });
            
            // SUELO de la habitación
            const suelo = new THREE.Mesh(new THREE.BoxGeometry(tamX, 0.2, tamZ), new THREE.MeshStandardMaterial({ color: 0xcccccc }));
            suelo.position.y = 0.1;
            suelo.receiveShadow = true;
            suelo.castShadow = true;
            grupo.add(suelo);
            
            // TECHO
            const techoHab = new THREE.Mesh(new THREE.BoxGeometry(tamX, 0.2, tamZ), paredMat);
            techoHab.position.y = altura;
            techoHab.receiveShadow = true;
            techoHab.castShadow = true;
            grupo.add(techoHab);
            
            // PARED NORTE (Z negativo)
            if (direccionPuerta === 'norte') {
                // Pared con puerta al norte
                const paredN1 = new THREE.Mesh(new THREE.BoxGeometry((tamX - anchoPuerta)/2, altura, grosorPared), paredMat);
                paredN1.position.set(-(anchoPuerta/2 + (tamX - anchoPuerta)/4), altura/2, -tamZ/2);
                grupo.add(paredN1);
                
                const paredN2 = new THREE.Mesh(new THREE.BoxGeometry((tamX - anchoPuerta)/2, altura, grosorPared), paredMat);
                paredN2.position.set((anchoPuerta/2 + (tamX - anchoPuerta)/4), altura/2, -tamZ/2);
                grupo.add(paredN2);
                
                // Dintel sobre la puerta
                const dintel = new THREE.Mesh(new THREE.BoxGeometry(anchoPuerta, altura - altoPuerta, grosorPared), paredMat);
                dintel.position.set(0, altoPuerta + (altura - altoPuerta)/2, -tamZ/2);
                grupo.add(dintel);
            } else {
                // Pared norte completa
                const paredN = new THREE.Mesh(new THREE.BoxGeometry(tamX, altura, grosorPared), paredMat);
                paredN.position.set(0, altura/2, -tamZ/2);
                grupo.add(paredN);
            }
            
            // PARED SUR (Z positivo)
            if (direccionPuerta === 'sur') {
                const paredS1 = new THREE.Mesh(new THREE.BoxGeometry((tamX - anchoPuerta)/2, altura, grosorPared), paredMat);
                paredS1.position.set(-(anchoPuerta/2 + (tamX - anchoPuerta)/4), altura/2, tamZ/2);
                grupo.add(paredS1);
                
                const paredS2 = new THREE.Mesh(new THREE.BoxGeometry((tamX - anchoPuerta)/2, altura, grosorPared), paredMat);
                paredS2.position.set((anchoPuerta/2 + (tamX - anchoPuerta)/4), altura/2, tamZ/2);
                grupo.add(paredS2);
                
                const dintel = new THREE.Mesh(new THREE.BoxGeometry(anchoPuerta, altura - altoPuerta, grosorPared), paredMat);
                dintel.position.set(0, altoPuerta + (altura - altoPuerta)/2, tamZ/2);
                grupo.add(dintel);
            } else {
                const paredS = new THREE.Mesh(new THREE.BoxGeometry(tamX, altura, grosorPared), paredMat);
                paredS.position.set(0, altura/2, tamZ/2);
                grupo.add(paredS);
            }
            
            // PARED ESTE (X positivo)
            if (direccionPuerta === 'este') {
                const paredE1 = new THREE.Mesh(new THREE.BoxGeometry(grosorPared, altura, (tamZ - anchoPuerta)/2), paredMat);
                paredE1.position.set(tamX/2, altura/2, -(anchoPuerta/2 + (tamZ - anchoPuerta)/4));
                grupo.add(paredE1);
                
                const paredE2 = new THREE.Mesh(new THREE.BoxGeometry(grosorPared, altura, (tamZ - anchoPuerta)/2), paredMat);
                paredE2.position.set(tamX/2, altura/2, (anchoPuerta/2 + (tamZ - anchoPuerta)/4));
                grupo.add(paredE2);
                
                const dintel = new THREE.Mesh(new THREE.BoxGeometry(grosorPared, altura - altoPuerta, anchoPuerta), paredMat);
                dintel.position.set(tamX/2, altoPuerta + (altura - altoPuerta)/2, 0);
                grupo.add(dintel);
            } else {
                const paredE = new THREE.Mesh(new THREE.BoxGeometry(grosorPared, altura, tamZ), paredMat);
                paredE.position.set(tamX/2, altura/2, 0);
                grupo.add(paredE);
            }
            
            // PARED OESTE (X negativo)
            if (direccionPuerta === 'oeste') {
                const paredO1 = new THREE.Mesh(new THREE.BoxGeometry(grosorPared, altura, (tamZ - anchoPuerta)/2), paredMat);
                paredO1.position.set(-tamX/2, altura/2, -(anchoPuerta/2 + (tamZ - anchoPuerta)/4));
                grupo.add(paredO1);
                
                const paredO2 = new THREE.Mesh(new THREE.BoxGeometry(grosorPared, altura, (tamZ - anchoPuerta)/2), paredMat);
                paredO2.position.set(-tamX/2, altura/2, (anchoPuerta/2 + (tamZ - anchoPuerta)/4));
                grupo.add(paredO2);
                
                const dintel = new THREE.Mesh(new THREE.BoxGeometry(grosorPared, altura - altoPuerta, anchoPuerta), paredMat);
                dintel.position.set(-tamX/2, altoPuerta + (altura - altoPuerta)/2, 0);
                grupo.add(dintel);
            } else {
                const paredO = new THREE.Mesh(new THREE.BoxGeometry(grosorPared, altura, tamZ), paredMat);
                paredO.position.set(-tamX/2, altura/2, 0);
                grupo.add(paredO);
            }
            
            // --- MARCO DE PUERTA (para hacer visible la entrada) ---
            const marcoMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 }); // Madera
            const marcoAlto = new THREE.Mesh(new THREE.BoxGeometry(anchoPuerta + 0.2, 0.2, 0.3), marcoMat);
            
            // Colocar el marco según dirección
            if (direccionPuerta === 'norte') {
                marcoAlto.position.set(0, altoPuerta, -tamZ/2 - 0.1);
                grupo.add(marcoAlto);
                
                const marcoIzq = new THREE.Mesh(new THREE.BoxGeometry(0.2, altoPuerta, 0.3), marcoMat);
                marcoIzq.position.set(-anchoPuerta/2 - 0.1, altoPuerta/2, -tamZ/2 - 0.1);
                grupo.add(marcoIzq);
                
                const marcoDer = new THREE.Mesh(new THREE.BoxGeometry(0.2, altoPuerta, 0.3), marcoMat);
                marcoDer.position.set(anchoPuerta/2 + 0.1, altoPuerta/2, -tamZ/2 - 0.1);
                grupo.add(marcoDer);
            }
            
            if (direccionPuerta === 'sur') {
                marcoAlto.position.set(0, altoPuerta, tamZ/2 + 0.1);
                grupo.add(marcoAlto);
                
                const marcoIzq = new THREE.Mesh(new THREE.BoxGeometry(0.2, altoPuerta, 0.3), marcoMat);
                marcoIzq.position.set(-anchoPuerta/2 - 0.1, altoPuerta/2, tamZ/2 + 0.1);
                grupo.add(marcoIzq);
                
                const marcoDer = new THREE.Mesh(new THREE.BoxGeometry(0.2, altoPuerta, 0.3), marcoMat);
                marcoDer.position.set(anchoPuerta/2 + 0.1, altoPuerta/2, tamZ/2 + 0.1);
                grupo.add(marcoDer);
            }
            
            if (direccionPuerta === 'este') {
                marcoAlto.rotation.y = Math.PI/2;
                marcoAlto.position.set(tamX/2 + 0.1, altoPuerta, 0);
                grupo.add(marcoAlto);
                
                const marcoIzq = new THREE.Mesh(new THREE.BoxGeometry(0.3, altoPuerta, 0.2), marcoMat);
                marcoIzq.position.set(tamX/2 + 0.1, altoPuerta/2, -anchoPuerta/2 - 0.1);
                grupo.add(marcoIzq);
                
                const marcoDer = new THREE.Mesh(new THREE.BoxGeometry(0.3, altoPuerta, 0.2), marcoMat);
                marcoDer.position.set(tamX/2 + 0.1, altoPuerta/2, anchoPuerta/2 + 0.1);
                grupo.add(marcoDer);
            }
            
            if (direccionPuerta === 'oeste') {
                marcoAlto.rotation.y = Math.PI/2;
                marcoAlto.position.set(-tamX/2 - 0.1, altoPuerta, 0);
                grupo.add(marcoAlto);
                
                const marcoIzq = new THREE.Mesh(new THREE.BoxGeometry(0.3, altoPuerta, 0.2), marcoMat);
                marcoIzq.position.set(-tamX/2 - 0.1, altoPuerta/2, -anchoPuerta/2 - 0.1);
                grupo.add(marcoIzq);
                
                const marcoDer = new THREE.Mesh(new THREE.BoxGeometry(0.3, altoPuerta, 0.2), marcoMat);
                marcoDer.position.set(-tamX/2 - 0.1, altoPuerta/2, anchoPuerta/2 + 0.1);
                grupo.add(marcoDer);
            }
            
            // --- CONTENIDO DE LA HABITACIÓN (cuadros y esculturas) ---
            
            // Cuadros en paredes interiores
            const coloresCuadros = [0xff3333, 0x33ff33, 0x3333ff, 0xffff00, 0xff00ff];
            
            // Cuadro en pared norte (si no hay puerta ahí)
            if (direccionPuerta !== 'norte') {
                const cuadroN = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.9, 0.1), new THREE.MeshStandardMaterial({ color: coloresCuadros[0] }));
                cuadroN.position.set(-1, 1.5, -tamZ/2 + 0.2);
                grupo.add(cuadroN);
            }
            
            // Cuadro en pared sur
            if (direccionPuerta !== 'sur') {
                const cuadroS = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.9, 0.1), new THREE.MeshStandardMaterial({ color: coloresCuadros[1] }));
                cuadroS.position.set(1, 1.5, tamZ/2 - 0.2);
                grupo.add(cuadroS);
            }
            
            // Cuadro en pared este
            if (direccionPuerta !== 'este') {
                const cuadroE = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.9, 1.2), new THREE.MeshStandardMaterial({ color: coloresCuadros[2] }));
                cuadroE.position.set(tamX/2 - 0.2, 1.5, -1);
                grupo.add(cuadroE);
            }
            
            // Cuadro en pared oeste
            if (direccionPuerta !== 'oeste') {
                const cuadroO = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.9, 1.2), new THREE.MeshStandardMaterial({ color: coloresCuadros[3] }));
                cuadroO.position.set(-tamX/2 + 0.2, 1.5, 1);
                grupo.add(cuadroO);
            }
            
            // Escultura central
            const pedestal = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.6, 0.3), new THREE.MeshStandardMaterial({ color: 0xaa9977 }));
            pedestal.position.set(0, 0.3, 0);
            pedestal.castShadow = true;
            pedestal.receiveShadow = true;
            grupo.add(pedestal);
            
            const escultura = new THREE.Mesh(new THREE.TorusKnotGeometry(0.3, 0.1, 64, 8), new THREE.MeshStandardMaterial({ color: coloresCuadros[4] }));
            escultura.position.set(0, 1.0, 0);
            escultura.castShadow = true;
            escultura.receiveShadow = true;
            grupo.add(escultura);
            
            // Luz dentro de la habitación
            const luzHabitacion = new THREE.PointLight(0xffffff, 0.8, 10);
            luzHabitacion.position.set(0, 2.5, 0);
            grupo.add(luzHabitacion);
            
            grupo.position.set(posX, 0, posZ);
            
            return grupo;
        }

        // --- CREAR LAS 5 HABITACIONES CON PUERTAS HACIA EL CENTRO ---
        
        // Habitación 1: NORTE (detrás)
        const hab1 = crearHabitacion(5, 5, 0xaaccff, 0, -7, 'sur');
        scene.add(hab1);
        
        // Habitación 2: SUR (adelante)
        const hab2 = crearHabitacion(5, 5, 0xffccaa, 0, 7, 'norte');
        scene.add(hab2);
        
        // Habitación 3: ESTE (derecha)
        const hab3 = crearHabitacion(5, 5, 0xaaffaa, 7, 0, 'oeste');
        scene.add(hab3);
        
        // Habitación 4: OESTE (izquierda)
        const hab4 = crearHabitacion(5, 5, 0xcc99ff, -7, 0, 'este');
        scene.add(hab4);
        
        // Habitación 5: ESQUINA (diagonal)
        const hab5 = crearHabitacion(5, 5, 0xffaa99, 5, -5, 'norte');
        scene.add(hab5);

        // --- PAREDES INTERIORES DEL PASILLO (para separar visualmente) ---
        const paredPasilloMat = new THREE.MeshStandardMaterial({ color: 0x3a4a5a });
        
        // Pequeñas paredes que delimitan el pasillo central
        const p1 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 3, 2), paredPasilloMat);
        p1.position.set(-2, 1.5, -3);
        scene.add(p1);
        
        const p2 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 3, 2), paredPasilloMat);
        p2.position.set(2, 1.5, -3);
        scene.add(p2);
        
        const p3 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 3, 2), paredPasilloMat);
        p3.position.set(-2, 1.5, 3);
        scene.add(p3);
        
        const p4 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 3, 2), paredPasilloMat);
        p4.position.set(2, 1.5, 3);
        scene.add(p4);

        // --- ANIMACIÓN ---
        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked) {
                direction.z = Number(moveState.forward) - Number(moveState.backward);
                direction.x = Number(moveState.right) - Number(moveState.left);
                direction.normalize();

                if (moveState.forward || moveState.backward) velocity.z = direction.z * speed;
                else velocity.z = 0;

                if (moveState.left || moveState.right) velocity.x = direction.x * speed;
                else velocity.x = 0;

                controls.moveRight(velocity.x * 0.1);
                controls.moveForward(velocity.z * 0.1);
                
                // Gravedad simple
                if (camera.position.y > 2) {
                    camera.position.y -= 0.05;
                }
            }

            renderer.render(scene, camera);
        }
        
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        console.log('Museo con puertas listo! Haz clic para comenzar a explorar');
    </script>
</body>
</html>
