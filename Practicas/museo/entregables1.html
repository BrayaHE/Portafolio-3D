<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museo Interactivo 3D | Producto Integrador</title>
    <link rel="stylesheet" href="./css/museo.css">
</head>
<body>
    <div id="app"></div>

    <div id="status" class="hud">MUSEO | Haz clic para comenzar</div>
    <div id="controls" class="hud">CLIC = activar mouse y seleccionar pinturas | WASD = moverte | ESPACIO = saltar | ESC = liberar cursor</div>

    <aside id="catalog">
        <h2>Exhibiciones Actuales</h2>
        <p>Sala Renacentista</p>
        <p>Sala Impresionista</p>
        <p>Sala Moderna</p>
        <p>Sala Contemporanea</p>
    </aside>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="./js/main.js"></script>
</body>
</html>
